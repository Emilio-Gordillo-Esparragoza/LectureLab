name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-app.txt

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6.0"

      - name: Ruff check
        run: ruff check src app tests scripts

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-app.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run pytest with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-app.txt
            requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.7.0"

      - name: Audit app / CI requirements
        run: |
          pip-audit -r requirements-app.txt
          pip-audit -r requirements-ci.txt

      - name: Audit full requirements (informational)
        continue-on-error: true
        run: pip-audit -r requirements.txt
